<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="480" viewBox="0 0 1600 480" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c111a"/>
      <stop offset="1" stop-color="#070a10"/>
    </linearGradient>
    <radialGradient id="haze" cx="38%" cy="20%" r="60%">
      <stop offset="0" stop-color="#8ea9c0" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#8ea9c0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="name" x1="0" y1="108" x2="0" y2="186" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4f7fb"/>
      <stop offset="1" stop-color="#9fb6c6"/>
    </linearGradient>
    <pattern id="grid" width="62" height="62" patternUnits="userSpaceOnUse">
      <path d="M62 0 H0 V62" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="480" fill="url(#bg)"/>
  <rect width="1600" height="480" fill="url(#grid)"/>
  <rect width="1600" height="480" fill="url(#haze)"/>

  <!-- LEFT: hero type -->
  <text x="66" y="78" font-size="16" letter-spacing="3" fill="#6b7785">AI PRODUCT MANAGER &#183; BUILDER</text>
  <text x="62" y="172" font-size="76" font-weight="800" fill="url(#name)" letter-spacing="0.5">Ramin Hoodeh</text>
  <text x="64" y="234" font-size="48" font-style="italic" font-family="Georgia, 'Times New Roman', serif" fill="#8ea0ae">ships beautiful products.</text>
  <text x="66" y="290" font-size="18" fill="#828d99">Frontier-model capability &#8594; intuitive, beautifully crafted products &#183; 9 years in product.</text>

  <line x1="66" y1="330" x2="900" y2="330" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- product pills -->
  <g font-size="17" fill="#c3ccd6">
    <rect x="66"  y="356" width="104" height="38" rx="19" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="118" y="381" text-anchor="middle">Qadam</text>
    <rect x="182" y="356" width="140" height="38" rx="19" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="252" y="381" text-anchor="middle">Dreamsea</text>
    <rect x="334" y="356" width="92"  height="38" rx="19" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="380" y="381" text-anchor="middle">nsso</text>
    <rect x="438" y="356" width="132" height="38" rx="19" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="504" y="381" text-anchor="middle">RazinFlix</text>
    <rect x="582" y="356" width="226" height="38" rx="19" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="695" y="381" text-anchor="middle">24Seven Concierge</text>
  </g>

  <!-- RIGHT: glass panel -->
  <rect x="980" y="110" width="556" height="300" rx="22" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.10"/>
  <text x="1008" y="152" font-size="14" letter-spacing="2.5" fill="#74808d">BUILD LOG</text>
  <text x="1008" y="184" font-size="17" fill="#aab4bf">Products people can use — and the</text>
  <text x="1008" y="208" font-size="17" fill="#aab4bf">open-source platform underneath them.</text>

  <g>
    <rect x="1008" y="232" width="160" height="120" rx="14" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="1028" y="266" font-size="13" letter-spacing="2" fill="#74808d">YEARS</text>
    <text x="1028" y="322" font-size="44" font-weight="800" fill="#eaf0f6">9</text>
    <rect x="1186" y="232" width="160" height="120" rx="14" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="1206" y="266" font-size="13" letter-spacing="2" fill="#74808d">APPS</text>
    <text x="1206" y="322" font-size="44" font-weight="800" fill="#eaf0f6">5</text>
    <rect x="1364" y="232" width="160" height="120" rx="14" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="1384" y="266" font-size="13" letter-spacing="2" fill="#74808d">TOOLS</text>
    <text x="1384" y="322" font-size="44" font-weight="800" fill="#eaf0f6">3</text>
  </g>

  <text x="1008" y="384" font-size="14" fill="#828d99">RAG Pipeline &#183; AI Costs Dashboard &#183; Social Wisdom Agent</text>
</svg>
